<!DOCTYPE html>
<html lang="ru" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">Web Summary</title>

    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <!-- Alpine.js -->
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.13.3/dist/cdn.min.js"></script>

    <style>
        :root,
        [data-bs-theme="light"] {
            --bs-primary: #fd7e14;
            --bs-primary-rgb: 253, 126, 20;
            --bs-link-color: #fd7e14;
            --bs-link-color-rgb: 253, 126, 20;
            --bs-link-hover-color: #e06b0b;
            --bs-link-hover-color-rgb: 224, 107, 11;
        }

        body {
            min-height: 100vh;
            background-color: #f8f9fa;
        }

        /* --- Bootstrap primary overrides --- */
        .btn-primary {
            --bs-btn-bg: #fd7e14;
            --bs-btn-border-color: #fd7e14;
            --bs-btn-hover-bg: #e06b0b;
            --bs-btn-hover-border-color: #d4650a;
            --bs-btn-active-bg: #d4650a;
            --bs-btn-active-border-color: #c85e09;
            --bs-btn-disabled-bg: #fd7e14;
            --bs-btn-disabled-border-color: #fd7e14;
            color: #fff;
        }
        .btn-outline-primary {
            --bs-btn-color: #fd7e14;
            --bs-btn-border-color: #fd7e14;
            --bs-btn-hover-bg: #fd7e14;
            --bs-btn-hover-border-color: #fd7e14;
            --bs-btn-hover-color: #fff;
            --bs-btn-active-bg: #e06b0b;
            --bs-btn-active-border-color: #e06b0b;
            --bs-btn-active-color: #fff;
        }
        .text-primary { color: #fd7e14 !important; }
        .bg-primary { background-color: #fd7e14 !important; }
        .border-primary { border-color: #fd7e14 !important; }
        .spinner-border.text-primary { color: #fd7e14 !important; }

        .form-control:focus,
        .form-select:focus {
            border-color: #fd7e14;
            box-shadow: 0 0 0 0.25rem rgba(253, 126, 20, 0.25);
        }
        .form-check-input:checked {
            background-color: #fd7e14;
            border-color: #fd7e14;
        }
        .form-check-input:focus {
            border-color: #fd7e14;
            box-shadow: 0 0 0 0.25rem rgba(253, 126, 20, 0.25);
        }

        .nav-pills .nav-link.active {
            background-color: #fd7e14;
            color: #fff !important;
        }
        .nav-pills .nav-link:not(.active) {
            color: #fd7e14;
        }
        .nav-pills .nav-link:not(.active):hover {
            color: #e06b0b;
        }

        /* --- Card header brand --- */
        .card-header-brand {
            background-color: #fff3e8;
            border-bottom: 1px solid #fd7e14;
        }

        /* --- General UI --- */
        .navbar {
            box-shadow: 0 2px 4px rgba(0,0,0,.1);
        }
        .card {
            box-shadow: 0 1px 3px rgba(0,0,0,.12);
        }
        .table-responsive {
            border-radius: 0.375rem;
        }
        .status-badge {
            padding: 0.35em 0.65em;
            font-size: 0.875rem;
        }
        .btn-icon {
            width: 32px;
            height: 32px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
        }

        .navbar .nav-link {
            color: #ffffff !important;
        }
        .navbar .nav-link:hover {
            color: #ffffffaa !important;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <nav th:fragment="navbar" class="navbar navbar-expand-lg navbar-dark mb-4" style="background-color: #fd7e14;">
        <div class="container-fluid">
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="/incidents">
                            <i class="bi bi-list-ul"></i> Аварии
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/shifts">
                            <i class="bi bi-clock-history"></i> Смены
                        </a>
                    </li>
                    <!-- Админка (только для админов) -->
                    <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'admin')">
                        <a class="nav-link" href="/admin/users">
                            <i class="bi bi-people-fill"></i> Пользователи
                        </a>
                    </li>

                    <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'admin')">
                        <a class="nav-link" href="/admin/roles">
                            <i class="bi bi-people-fill"></i> Роли
                        </a>
                    </li>

                    <li class="nav-item" sec:authorize="hasAnyAuthority('ADMIN', 'admin')">
                        <a class="nav-link" href="/admin/dictionaries">
                            <i class="bi bi-book"></i> Справочники
                        </a>
                    </li>
                </ul>
                <ul class="navbar-nav" sec:authorize="isAuthenticated()">
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                            <i class="bi bi-person-circle"></i>
                            <span sec:authentication="principal.fullName">Пользователь</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><h6 class="dropdown-header" sec:authentication="principal.username">username</h6></li>
                            <li><span class="dropdown-item-text small" sec:authentication="principal.roleDisplayName">ROLE</span></li>
                            <li><hr class="dropdown-divider"></li>
                            <li>
                                <form method="post" action="/logout" style="margin: 0;">
                                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                                    <button type="submit" class="dropdown-item text-danger">
                                        <i class="bi bi-box-arrow-right"></i> Выйти
                                    </button>
                                </form>
                            </li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Footer -->
    <footer th:fragment="footer" class="mt-auto py-3 bg-light border-top">
        <div class="container text-center">
            <span class="text-muted">Web Summary © 2025 | Система учёта аварий на сети</span>
        </div>
    </footer>

    <!-- Scripts -->
    <div th:fragment="scripts">
        <script th:src="@{/js/incident-duration.js}"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
        <script>
            function showToast(message, type = 'info') {
                const toastContainer = document.getElementById('toastContainer');
                if (!toastContainer) return;

                const toastId = 'toast-' + Date.now();
                const bgClass = type === 'success' ? 'bg-success' :
                               type === 'error' ? 'bg-danger' :
                               type === 'warning' ? 'bg-warning' : 'bg-info';

                const toastHtml = `
                    <div id="${toastId}" class="toast align-items-center text-white ${bgClass} border-0" role="alert">
                        <div class="d-flex">
                            <div class="toast-body">${message}</div>
                            <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
                        </div>
                    </div>
                `;

                toastContainer.insertAdjacentHTML('beforeend', toastHtml);
                const toastElement = document.getElementById(toastId);
                const toast = new bootstrap.Toast(toastElement);
                toast.show();

                toastElement.addEventListener('hidden.bs.toast', () => {
                    toastElement.remove();
                });
            }

            window.showToast = showToast;
        </script>
    </div>

    <!-- Toast Container -->
    <div th:fragment="toastContainer" id="toastContainer" class="toast-container position-fixed top-0 end-0 p-3" style="z-index: 9999;"></div>
</body>
</html>
